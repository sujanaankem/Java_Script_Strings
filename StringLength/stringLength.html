<!DOCTYPE html>
<html>

<head>
    <title>String Length</title>
    <script src="stringLength.js"></script>
</head>

<body>
    <h2>String Length</h2>
    <label for="lblLength">Enter a string</label>
    <input id="txtLength" type="text" placeholder="Enter a text">
    <button id="btnCheck" onclick="onClickLength()">Check</button>
    <p id="pResult"></p>
    <hr>
    <h2>String Length limit</h2>
    <label for="lblLengthLimit">Enter a string</label>
    <textarea rows="5" cols="30" id="txtLengthLimit" type="text" placeholder="Enter a text" onkeyup="onClickWrite()"></textarea>
    <p id="pResultLimit"></p>
</body>
</html>
